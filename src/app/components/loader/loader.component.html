<div class="loading-overlay" #overlay>
  <svg>
    <defs>
      <clipPath id="almondClip">
        <path #almondPath d="" />
      </clipPath>

      <mask id="irisMask">
        <rect width="100%" height="100%" fill="white"/>
        <circle #iris cx="50%" cy="50%" r="0" fill="black"/>
      </mask>
    </defs>
    <g mask="url(#irisMask)">
      <rect width="100%" height="100%" fill="#0a0a0a"/>
      <rect width="100%" height="100%" fill="white" clip-path="url(#almondClip)"/>
    </g>
  </svg>
</div>
